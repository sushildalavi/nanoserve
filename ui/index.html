<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nanoserve chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --text:      #e2e4ec;
      --muted:     #6b7080;
      --accent:    #4f8ef7;
      --user-bg:   #1e2a45;
      --asst-bg:   #1a1d27;
      --radius:    10px;
      --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    #model-badge {
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    /* ── messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      scroll-behavior: smooth;
    }

    .msg-row {
      display: flex;
      padding: 4px 20px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .msg-row.user  { justify-content: flex-end; }
    .msg-row.asst  { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      border: 1px solid #2c3d5a;
      color: var(--text);
      border-bottom-right-radius: 3px;
    }

    .msg-row.asst .bubble {
      background: var(--asst-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    /* typing indicator */
    .typing-dots {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 20px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%           { opacity: 1;   }
    }

    /* ── empty state ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--muted);
      user-select: none;
      pointer-events: none;
    }

    #empty .logo {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    #empty p { font-size: 14px; }

    /* ── input bar ── */
    #input-bar {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 14px 20px;
      flex-shrink: 0;
    }

    #input-wrap {
      display: flex;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
      align-items: flex-end;
    }

    #prompt {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      padding: 10px 14px;
      resize: none;
      max-height: 160px;
      min-height: 42px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }

    #prompt:focus { border-color: var(--accent); }
    #prompt::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      padding: 10px 18px;
      height: 42px;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) { background: #3d7ae6; }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #status-line {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      min-height: 16px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

<header>
  <h1>nanoserve chat</h1>
  <span id="model-badge">model: —</span>
</header>

<div id="messages">
  <div id="empty">
    <div class="logo">nano</div>
    <p>Send a message to get started.</p>
  </div>
</div>

<div id="input-bar">
  <div id="input-wrap">
    <textarea id="prompt" rows="1" placeholder="Type a message…" autofocus></textarea>
    <button id="send-btn">Send</button>
  </div>
  <div id="status-line"></div>
</div>

<script>
  const API_BASE = 'http://localhost:8000';
  const DEFAULT_MODEL = 'TinyLlama';

  const messagesEl = document.getElementById('messages');
  const emptyEl    = document.getElementById('empty');
  const promptEl   = document.getElementById('prompt');
  const sendBtn    = document.getElementById('send-btn');
  const modelBadge = document.getElementById('model-badge');
  const statusLine = document.getElementById('status-line');

  let model = DEFAULT_MODEL;
  let history = []; // { role, content }
  let busy = false;

  // ── fetch model name on load ──────────────────────────────────────────────
  (async () => {
    try {
      const r = await fetch(`${API_BASE}/v1/models`, { signal: AbortSignal.timeout(3000) });
      if (r.ok) {
        const j = await r.json();
        const first = j?.data?.[0]?.id;
        if (first) model = first;
      }
    } catch (_) { /* endpoint doesn't exist — keep default */ }
    modelBadge.textContent = `model: ${model}`;
  })();

  // ── auto-resize textarea ──────────────────────────────────────────────────
  promptEl.addEventListener('input', () => {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px';
  });

  // ── send on Enter (Shift+Enter = newline) ─────────────────────────────────
  promptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!busy) send();
    }
  });

  sendBtn.addEventListener('click', () => { if (!busy) send(); });

  // ── helpers ───────────────────────────────────────────────────────────────
  function scrollBottom() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }

  function appendBubble(role, text) {
    emptyEl.style.display = 'none';
    const row    = document.createElement('div');
    row.className = `msg-row ${role === 'user' ? 'user' : 'asst'}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return bubble;
  }

  function showTyping() {
    emptyEl.style.display = 'none';
    const row    = document.createElement('div');
    row.className = 'msg-row asst';
    row.id = 'typing-row';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function setStatus(msg) { statusLine.textContent = msg; }
  function setBusy(val) {
    busy = val;
    sendBtn.disabled = val;
    promptEl.disabled = val;
  }

  // ── main send ─────────────────────────────────────────────────────────────
  async function send() {
    const text = promptEl.value.trim();
    if (!text) return;

    promptEl.value = '';
    promptEl.style.height = 'auto';
    appendBubble('user', text);
    history.push({ role: 'user', content: text });

    setBusy(true);
    setStatus('');
    showTyping();

    let assistantText = '';
    let asstBubble = null;

    try {
      const res = await fetch(`${API_BASE}/v1/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model,
          messages: history,
          stream: true,
        }),
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`${res.status} ${err}`);
      }

      removeTyping();
      asstBubble = appendBubble('assistant', '');

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   buf     = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const chunk = JSON.parse(data);
            const delta = chunk?.choices?.[0]?.delta?.content;
            if (delta) {
              assistantText += delta;
              asstBubble.textContent = assistantText;
              scrollBottom();
            }
          } catch (_) { /* skip malformed chunk */ }
        }
      }

      if (!assistantText) throw new Error('empty response from server');
      history.push({ role: 'assistant', content: assistantText });

    } catch (err) {
      removeTyping();
      if (asstBubble && !assistantText) {
        asstBubble.closest('.msg-row')?.remove();
      }
      const errBubble = appendBubble('assistant', `Error: ${err.message}`);
      errBubble.style.color = '#e57373';
      setStatus('Request failed. Is nanoserve running at localhost:8000?');
    } finally {
      setBusy(false);
      promptEl.focus();
    }
  }
</script>
</body>
</html>
