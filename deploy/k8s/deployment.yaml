apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanoserve
  namespace: nanoserve
  labels:
    app.kubernetes.io/name: nanoserve
    app.kubernetes.io/component: api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: nanoserve
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nanoserve
        app.kubernetes.io/component: api
      annotations:
        # scrape-by-pod pattern, so the target set stays in sync with
        # replica count even without Prometheus-Operator installed.
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nanoserve
          image: nanoserve:latest
          imagePullPolicy: IfNotPresent
          args: ["serve", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nanoserve-config
          # first start pulls TinyLlama (~2GB) — generous liveness
          # initial delay so the pod isn't killed during weight download
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "3Gi"
            limits:
              cpu: "2"
              memory: "6Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # HF cache writes under /app/.cache
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: hf-cache
              mountPath: /app/.cache/huggingface
      volumes:
        - name: hf-cache
          emptyDir:
            # bounded so a runaway cache can't fill the node disk
            sizeLimit: 8Gi
