apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# nanoserve base: everything except the ServiceMonitor (which needs the
# prometheus-operator CRDs). if the operator is installed, add:
#   - servicemonitor.yaml
# to this list.

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: nanoserve
    includeSelectors: true

images:
  - name: nanoserve
    newTag: latest
