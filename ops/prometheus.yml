global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    env: local

scrape_configs:
  - job_name: nanoserve
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8000
        labels:
          instance: nanoserve-local

  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090
