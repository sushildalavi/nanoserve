apiVersion: 1

providers:
  - name: nanoserve
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # resolved at startup via observe.sh — grafana expands $VAR in
      # provisioning yaml since v9.0. using an env var keeps this repo-
      # location-independent (i.e. the repo can be cloned anywhere).
      path: $NANOSERVE_DASHBOARDS_PATH
      foldersFromFilesStructure: false
